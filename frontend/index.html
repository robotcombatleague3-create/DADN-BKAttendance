<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Điểm danh RFID</title>
  <link rel="stylesheet" href="./src/css/style.css">
  <script type="module" src="./src/js/socket.js"></script>
  <script type="module" src="./src/js/dashboard.js"></script>
</head>
<body>
  
  <nav class="sidebar">
    <div class="logo">BK Attendance</div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">📍 Dashboard</a></li>
      <li><a href="students.html">👥 Quản lý Sinh viên</a></li>
      <li><a href="history.html">🕒 Lịch sử</a></li>

  <main class="main-content">
    <div class="header">
      <h1>Dashboard Điểm danh</h1>
    </div>

    <div class="flash-container" id="flash-container"></div>

    <div class="glass-card">

      <div class="table-container">
        <table id="attendance-table">

              <th>ID</th>
              <th>MSSV</th>
              <th>Họ tên</th>
              <th>Thời gian</th>

          </thead>
          <tbody id="attendance-body">

          </tbody>
        </table>

    </div>
